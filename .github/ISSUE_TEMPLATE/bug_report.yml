name: Bug report
description: Report a problem with neotest-nix
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please run
        `:checkhealth neotest-nix` first and include the output below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong? What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: >-
        Minimal steps, ideally with a small flake.nix or test file that
        triggers the problem.
      placeholder: |
        1. Open flake.nix with `checks.x86_64-linux.foo`
        2. Run the nearest test
        3. ...
    validations:
      required: true
  - type: textarea
    id: checkhealth
    attributes:
      label: ":checkhealth neotest-nix output"
      render: text
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Adapter configuration
      description: How you register and configure neotest-nix.
      render: lua
    validations:
      required: false
  - type: input
    id: neovim-version
    attributes:
      label: Neovim version
      placeholder: "output of `nvim --version` first line"
    validations:
      required: true
  - type: input
    id: nix-version
    attributes:
      label: Nix version
      placeholder: "output of `nix --version`"
    validations:
      required: true
