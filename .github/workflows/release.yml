name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Read release PR branch
        id: release-pr
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          branch="$(printf '%s' "$PR_JSON" | jq -r '.headBranchName // empty')"
          if [ -z "$branch" ]; then
            echo "release-please did not report a release PR branch" >&2
            exit 1
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          ref: ${{ steps.release-pr.outputs.branch }}

      - name: Install Nix
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Format release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: nix fmt

      - name: Autosquash formatted release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          BRANCH: ${{ steps.release-pr.outputs.branch }}
        run: |
          if git diff --quiet; then
            echo "Release PR is already formatted."
            exit 0
          fi

          release_commit="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit --fixup="$release_commit"
          GIT_SEQUENCE_EDITOR=: git rebase -i --autosquash "$release_commit^"
          git push --force-with-lease origin "HEAD:$BRANCH"

  luarocks-upload:
    name: LuaRocks Upload
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish to LuaRocks
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        with:
          version: ${{ needs.release-please.outputs.tag_name }}
          summary: A Neotest adapter for Nix flakes.
          dependencies: |
            neotest
            nvim-nio
          copy_directories: |
            {{ neovim.plugin.dirs }}
          labels: |
            neovim
            neotest
            nix
